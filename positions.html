const W = 340, H = 170, M = {t: 10, r: 12, b: 20, l: 48};
const fmt = (v, dec = 0) => v == null ? "-" : v.toLocaleString("ko-KR",
  {minimumFractionDigits: dec, maximumFractionDigits: dec});
const TRIGGER_LABEL = {target: "목표 도달", stop: "손절 발동", expiry: "만료 경과"};

function niceTicks(lo, hi, n = 4) {
  const span = hi - lo || Math.abs(hi) || 1;
  const step0 = span / n, mag = 10 ** Math.floor(Math.log10(step0));
  const step = [1, 2, 2.5, 5, 10].map(x => x * mag).find(x => x >= step0);
  const t0 = Math.ceil(lo / step) * step, ticks = [];
  for (let t = t0; t <= hi + 1e-9; t += step) ticks.push(+t.toFixed(10));
  return ticks;
}

  const card = document.createElement("div"); card.className = "card";

  h2.appendChild(sm); card.appendChild(h2);

  let xmax = n - 1;

  const pad = (hi - lo || Math.abs(hi) || 1) * 0.08; lo -= pad; hi += pad;
  const X = i => M.l + (W - M.l - M.r) * (xmax ? i / xmax : 0.5);
  const Y = v => M.t + (H - M.t - M.b) * (1 - (v - lo) / (hi - lo));

  const svg = document.createElementNS(NS, "svg");
  svg.setAttribute("viewBox", `0 0 ${W} ${H}`);
  svg.setAttribute("tabindex", "0"); svg.setAttribute("role", "img");
  svg.setAttribute("aria-label", `${p.name} 매도지표`);

  for (const t of niceTicks(lo, hi)) {
    const ln = document.createElementNS(NS, "line");
    ln.setAttribute("x1", M.l); ln.setAttribute("x2", W - M.r);
    ln.setAttribute("y1", Y(t)); ln.setAttribute("y2", Y(t));
    ln.setAttribute("stroke", "var(--grid)"); svg.appendChild(ln);
    const tx = document.createElementNS(NS, "text");

    tx.setAttribute("text-anchor", "end"); tx.setAttribute("class", "tick");
    tx.textContent = fmt(t); svg.appendChild(tx);
  }

    tx.setAttribute("text-anchor", i === 0 ? "start" : "middle");
    tx.setAttribute("class", "tick"); tx.textContent = md(p.dates[i]);
    svg.appendChild(tx);

  const poly = (vals, color, width, dash) => {
    const pts = vals.map((v, i) => v == null ? null : `${X(i).toFixed(1)},${Y(v).toFixed(1)}`)

    const pl = document.createElementNS(NS, "polyline");
    pl.setAttribute("points", pts.join(" "));
    pl.setAttribute("fill", "none"); pl.setAttribute("stroke", color);
    pl.setAttribute("stroke-width", width);
    if (dash) pl.setAttribute("stroke-dasharray", dash);
    pl.setAttribute("stroke-linejoin", "round");
    svg.appendChild(pl);
  };
  const vline = (i, label, dash) => {

    ln.setAttribute("y1", M.t); ln.setAttribute("y2", H - M.b);

    if (dash) ln.setAttribute("stroke-dasharray", dash);
    svg.appendChild(ln);
    const tx = document.createElementNS(NS, "text");

    tx.setAttribute("class", "lbl"); tx.textContent = label;

  const used = [];
  const endLbl = (v, text) => {
    if (v == null) return;
    let y = Y(v);
    while (used.some(u => Math.abs(u - y) < 10)) y += 10;
    used.push(y);
    const tx = document.createElementNS(NS, "text");
    tx.setAttribute("x", W - M.r); tx.setAttribute("y", Math.min(y + 3, H - M.b - 2));

  };

  cross.setAttribute("y1", M.t); cross.setAttribute("y2", H - M.b);
  cross.setAttribute("stroke", "var(--axis)"); cross.style.display = "none";
  svg.appendChild(cross);
  const tip = document.createElement("div"); tip.className = "tip";
  let idx = -1;
  const showAt = i => {
    idx = i = Math.max(0, Math.min(n - 1, i));
    cross.style.display = ""; cross.setAttribute("x1", X(i)); cross.setAttribute("x2", X(i));
    tip.style.display = "block"; tip.textContent = "";
    const d = document.createElement("div"); d.className = "d";
    d.textContent = p.dates[i]; tip.appendChild(d);
    for (const [label, v] of [["종가", p.close[i]], ["목표(상단)", p.upper[i]],
                              ["손절(하단)", p.lower[i]]]) {
      const row = document.createElement("div"); row.className = "row";
      const nm = document.createElement("span"); nm.className = "n"; nm.textContent = label;
      const b = document.createElement("b"); b.textContent = fmt(v);
      row.appendChild(nm); row.appendChild(b); tip.appendChild(row);
    }
    const rect = svg.getBoundingClientRect();
    tip.style.left = Math.min(X(i) / W * rect.width + 12, rect.width - 140) + "px";
    tip.style.top = "52px";
  };
  const hide = () => { cross.style.display = "none"; tip.style.display = "none"; idx = -1; };
  svg.addEventListener("pointermove", e => {
    const rect = svg.getBoundingClientRect();
    showAt(Math.round((( e.clientX - rect.left) / rect.width * W - M.l) / (W - M.l - M.r) * xmax));
  });
  svg.addEventListener("pointerleave", hide);
  svg.addEventListener("focus", () => showAt(n - 1));
  svg.addEventListener("blur", hide);
  svg.addEventListener("keydown", e => {

  card.appendChild(svg); card.appendChild(tip);

  // 표 보기 (접근성)
  const det = document.createElement("details");
  const sum = document.createElement("summary"); sum.textContent = "표로 보기"; det.appendChild(sum);

    const tr = document.createElement("tr");
    for (const v of [p.dates[i], fmt(p.close[i]), fmt(p.upper[i]), fmt(p.lower[i])]) {

sub.textContent = sub.textContent.replace("페이지 하단 데이터 기준 표기",
