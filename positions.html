<meta charset="utf-8">
<title>kr-quant 모의 보유 매도지표</title>
<style>
.viz-root {
  color-scheme: light;
  --surface-1: #fcfcfb; --page: #f9f9f7;
  --ink-1: #0b0b0b; --ink-2: #52514e; --ink-mut: #898781;
  --grid: #e1e0d9; --axis: #c3c2b7; --ring: rgba(11,11,11,0.10);
  --s1: #2a78d6; --up: #d32f2f; --down: #1976d2;
}
@media (prefers-color-scheme: dark) {
  :root:where(:not([data-theme="light"])) .viz-root {
    color-scheme: dark;
    --surface-1: #1a1a19; --page: #0d0d0d;
    --ink-1: #ffffff; --ink-2: #c3c2b7; --ink-mut: #898781;
    --grid: #2c2c2a; --axis: #383835; --ring: rgba(255,255,255,0.10);
    --s1: #3987e5; --up: #ef5350; --down: #64b5f6;
  }
}
:root[data-theme="dark"] .viz-root {
  color-scheme: dark;
  --surface-1: #1a1a19; --page: #0d0d0d;
  --ink-1: #ffffff; --ink-2: #c3c2b7; --ink-mut: #898781;
  --grid: #2c2c2a; --axis: #383835; --ring: rgba(255,255,255,0.10);
  --s1: #3987e5; --up: #ef5350; --down: #64b5f6;
}
.viz-root {
  font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
  background: var(--page); color: var(--ink-1);
  margin: 0; padding: 20px; min-height: 100vh; box-sizing: border-box;
}
.viz-root h1 { font-size: 19px; margin: 0 0 2px; }
.sub { color: var(--ink-2); font-size: 12.5px; margin: 0 0 6px; }
.nav { font-size: 13px; margin: 0 0 14px; }
.nav a { color: var(--s1); text-decoration: none; margin-right: 14px; }
.nav .here { color: var(--ink-1); font-weight: 700; margin-right: 14px; }
.grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 14px; }
.card { background: var(--surface-1); border: 1px solid var(--ring);
  border-radius: 10px; padding: 12px 14px 8px; position: relative; }
.card h2 { font-size: 13.5px; margin: 0; font-weight: 600; }
.card h2 small { font-weight: 400; color: var(--ink-mut); }
.card .meta { font-size: 11px; color: var(--ink-mut); margin: 1px 0 4px; }
.card .pnl { font-size: 18px; font-weight: 700; }
.badge { display: inline-block; font-size: 11px; font-weight: 600; padding: 1px 8px;
  border-radius: 9px; border: 1px solid var(--axis); color: var(--ink-2);
  vertical-align: 2px; margin-left: 8px; }
.card svg { width: 100%; height: auto; display: block; touch-action: none; outline: none; }
.card svg:focus-visible { outline: 2px solid var(--s1); outline-offset: 2px; border-radius: 4px; }
.tip { position: absolute; pointer-events: none; display: none; z-index: 5;
  background: var(--surface-1); border: 1px solid var(--ring); border-radius: 7px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.13); padding: 6px 9px; font-size: 12px; min-width: 120px; }
.tip .d { color: var(--ink-mut); font-size: 11px; margin-bottom: 2px; }
.tip .row { display: flex; justify-content: space-between; gap: 10px; }
.tip .row b { font-variant-numeric: tabular-nums; }
.tip .row .n { color: var(--ink-2); }
.tick { fill: var(--ink-mut); font-size: 10.5px; font-variant-numeric: tabular-nums; }
.lbl { fill: var(--ink-2); font-size: 10.5px; font-variant-numeric: tabular-nums;
  paint-order: stroke; stroke: var(--surface-1); stroke-width: 3px; }
details { margin: 4px 0 2px; }
summary { font-size: 11px; color: var(--ink-mut); cursor: pointer; }
.tbl { max-height: 180px; overflow: auto; margin-top: 4px; }
.tbl table { border-collapse: collapse; font-size: 11px; width: 100%; }
.tbl th, .tbl td { text-align: right; padding: 2px 6px; border-bottom: 1px solid var(--grid);
  font-variant-numeric: tabular-nums; color: var(--ink-2); }
.tbl th:first-child, .tbl td:first-child { text-align: left; }
</style>
<div class="viz-root">
<h1>모의 보유 매도지표</h1>
<p class="sub">기준 2026-07-16 · <b>모의투자 계좌</b> — 매도 규칙(C안): ①종가 ≥ 볼린저 상단 = 목표 도달
②종가 ≤ 하단 = 손절 ③편입 후 만료일 경과. 볼린저 파라미터·만료일은 페이지 하단 데이터 기준 표기.
백테스트 미검증 휴리스틱입니다.</p>
<div class="nav"><a href="./index.html">거시지표</a><span class="here">모의 보유 매도지표</span></div>
<div class="grid" id="grid"></div>
</div>
<script>
const DATA = {"asof":"2026-07-16","expiry_days":28,"boll":"20일·2σ","positions":[]};
const W = 340, H = 170, M = {t: 10, r: 12, b: 20, l: 48};
const fmt = (v, dec = 0) => v == null ? "-" : v.toLocaleString("ko-KR",
  {minimumFractionDigits: dec, maximumFractionDigits: dec});
const TRIGGER_LABEL = {target: "목표 도달", stop: "손절 발동", expiry: "만료 경과"};

function niceTicks(lo, hi, n = 4) {
  const span = hi - lo || Math.abs(hi) || 1;
  const step0 = span / n, mag = 10 ** Math.floor(Math.log10(step0));
  const step = [1, 2, 2.5, 5, 10].map(x => x * mag).find(x => x >= step0);
  const t0 = Math.ceil(lo / step) * step, ticks = [];
  for (let t = t0; t <= hi + 1e-9; t += step) ticks.push(+t.toFixed(10));
  return ticks;
}
const md = s => `${+s.slice(5, 7)}/${+s.slice(8, 10)}`;

const grid = document.getElementById("grid");
for (const p of DATA.positions) {
  const card = document.createElement("div"); card.className = "card";
  const h2 = document.createElement("h2");
  h2.textContent = `${p.name} `;
  const sm = document.createElement("small");
  sm.textContent = `${p.code} · ${fmt(p.qty)}주 · 평단 ${fmt(p.avg_price)}`;
  h2.appendChild(sm); card.appendChild(h2);
  const meta = document.createElement("div"); meta.className = "meta";
  meta.textContent = `매수 ${p.entry ?? "?"} → 만료 ${p.expiry ?? "?"} (${DATA.expiry_days}일)`;
  card.appendChild(meta);
  const pnl = document.createElement("div"); pnl.className = "pnl";
  pnl.style.color = p.pnl_pct > 0 ? "var(--up)" : (p.pnl_pct < 0 ? "var(--down)" : "var(--ink-2)");
  pnl.textContent = `${p.pnl_pct >= 0 ? "+" : ""}${fmt(p.pnl_pct, 2)}%`;
  if (p.trigger) {
    const b = document.createElement("span"); b.className = "badge";
    b.textContent = `⚑ ${TRIGGER_LABEL[p.trigger]}`; pnl.appendChild(b);
  }
  card.appendChild(pnl);

  if (!p.dates.length) {
    const none = document.createElement("div"); none.className = "meta";
    none.textContent = "(시세 없음 — 차트 생략)"; card.appendChild(none);
    grid.appendChild(card); continue;
  }

  const n = p.dates.length;
  // 만료일이 마지막 봉 이후면 x축을 영업일 근사(달력일×5/7)만큼 연장
  let xmax = n - 1;
  if (p.expiry && p.expiry > p.dates[n - 1]) {
    const extra = Math.round((new Date(p.expiry) - new Date(p.dates[n - 1])) / 864e5 * 5 / 7);
    xmax = n - 1 + Math.max(extra, 1);
  }
  const all = [...p.close, ...p.upper, ...p.lower, p.avg_price].filter(v => v != null);
  let lo = Math.min(...all), hi = Math.max(...all);
  const pad = (hi - lo || Math.abs(hi) || 1) * 0.08; lo -= pad; hi += pad;
  const X = i => M.l + (W - M.l - M.r) * (xmax ? i / xmax : 0.5);
  const Y = v => M.t + (H - M.t - M.b) * (1 - (v - lo) / (hi - lo));
  const NS = "http://www.w3.org/2000/svg";
  const svg = document.createElementNS(NS, "svg");
  svg.setAttribute("viewBox", `0 0 ${W} ${H}`);
  svg.setAttribute("tabindex", "0"); svg.setAttribute("role", "img");
  svg.setAttribute("aria-label", `${p.name} 매도지표`);

  for (const t of niceTicks(lo, hi)) {
    const ln = document.createElementNS(NS, "line");
    ln.setAttribute("x1", M.l); ln.setAttribute("x2", W - M.r);
    ln.setAttribute("y1", Y(t)); ln.setAttribute("y2", Y(t));
    ln.setAttribute("stroke", "var(--grid)"); svg.appendChild(ln);
    const tx = document.createElementNS(NS, "text");
    tx.setAttribute("x", M.l - 5); tx.setAttribute("y", Y(t) + 3.5);
    tx.setAttribute("text-anchor", "end"); tx.setAttribute("class", "tick");
    tx.textContent = fmt(t); svg.appendChild(tx);
  }
  for (const i of [0, Math.round(n / 2), n - 1]) {
    const tx = document.createElementNS(NS, "text");
    tx.setAttribute("x", X(i)); tx.setAttribute("y", H - 6);
    tx.setAttribute("text-anchor", i === 0 ? "start" : "middle");
    tx.setAttribute("class", "tick"); tx.textContent = md(p.dates[i]);
    svg.appendChild(tx);
  }
  const poly = (vals, color, width, dash) => {
    const pts = vals.map((v, i) => v == null ? null : `${X(i).toFixed(1)},${Y(v).toFixed(1)}`)
      .filter(Boolean);
    if (!pts.length) return;
    const pl = document.createElementNS(NS, "polyline");
    pl.setAttribute("points", pts.join(" "));
    pl.setAttribute("fill", "none"); pl.setAttribute("stroke", color);
    pl.setAttribute("stroke-width", width);
    if (dash) pl.setAttribute("stroke-dasharray", dash);
    pl.setAttribute("stroke-linejoin", "round");
    svg.appendChild(pl);
  };
  const vline = (i, label, dash) => {
    const ln = document.createElementNS(NS, "line");
    ln.setAttribute("x1", X(i)); ln.setAttribute("x2", X(i));
    ln.setAttribute("y1", M.t); ln.setAttribute("y2", H - M.b);
    ln.setAttribute("stroke", "var(--axis)");
    if (dash) ln.setAttribute("stroke-dasharray", dash);
    svg.appendChild(ln);
    const tx = document.createElementNS(NS, "text");
    tx.setAttribute("x", Math.min(X(i) + 3, W - M.r - 30)); tx.setAttribute("y", M.t + 9);
    tx.setAttribute("class", "lbl"); tx.textContent = label;
    svg.appendChild(tx);
  };
  poly(p.upper, "var(--ink-mut)", 1.5, "4 3");
  poly(p.lower, "var(--ink-mut)", 1.5, "4 3");
  poly(Array(n).fill(p.avg_price), "var(--axis)", 1, "2 3");
  if (p.entry) {
    const ei = p.dates.findIndex(d => d >= p.entry);
    if (ei >= 0) vline(ei, `매수 ${md(p.entry)}`);
  }
  if (p.expiry) {
    const xi = p.expiry > p.dates[n - 1] ? xmax
      : Math.max(p.dates.findIndex(d => d >= p.expiry), 0);
    vline(xi, `만료 ${md(p.expiry)}`, "5 4");
  }
  poly(p.close, "var(--s1)", 2);
  // 우측 끝 라벨 — 목표/손절/평단 (겹침 회피)
  const used = [];
  const endLbl = (v, text) => {
    if (v == null) return;
    let y = Y(v);
    while (used.some(u => Math.abs(u - y) < 10)) y += 10;
    used.push(y);
    const tx = document.createElementNS(NS, "text");
    tx.setAttribute("x", W - M.r); tx.setAttribute("y", Math.min(y + 3, H - M.b - 2));
    tx.setAttribute("text-anchor", "end"); tx.setAttribute("class", "lbl");
    tx.textContent = text; svg.appendChild(tx);
  };
  endLbl(p.upper[n - 1], `목표 ${fmt(p.upper[n - 1])}`);
  endLbl(p.close[n - 1], `종가 ${fmt(p.close[n - 1])}`);
  endLbl(p.lower[n - 1], `손절 ${fmt(p.lower[n - 1])}`);
  endLbl(p.avg_price, `평단 ${fmt(p.avg_price)}`);

  // 크로스헤어 + 툴팁
  const cross = document.createElementNS(NS, "line");
  cross.setAttribute("y1", M.t); cross.setAttribute("y2", H - M.b);
  cross.setAttribute("stroke", "var(--axis)"); cross.style.display = "none";
  svg.appendChild(cross);
  const tip = document.createElement("div"); tip.className = "tip";
  let idx = -1;
  const showAt = i => {
    idx = i = Math.max(0, Math.min(n - 1, i));
    cross.style.display = ""; cross.setAttribute("x1", X(i)); cross.setAttribute("x2", X(i));
    tip.style.display = "block"; tip.textContent = "";
    const d = document.createElement("div"); d.className = "d";
    d.textContent = p.dates[i]; tip.appendChild(d);
    for (const [label, v] of [["종가", p.close[i]], ["목표(상단)", p.upper[i]],
                              ["손절(하단)", p.lower[i]]]) {
      const row = document.createElement("div"); row.className = "row";
      const nm = document.createElement("span"); nm.className = "n"; nm.textContent = label;
      const b = document.createElement("b"); b.textContent = fmt(v);
      row.appendChild(nm); row.appendChild(b); tip.appendChild(row);
    }
    const rect = svg.getBoundingClientRect();
    tip.style.left = Math.min(X(i) / W * rect.width + 12, rect.width - 140) + "px";
    tip.style.top = "52px";
  };
  const hide = () => { cross.style.display = "none"; tip.style.display = "none"; idx = -1; };
  svg.addEventListener("pointermove", e => {
    const rect = svg.getBoundingClientRect();
    showAt(Math.round((( e.clientX - rect.left) / rect.width * W - M.l) / (W - M.l - M.r) * xmax));
  });
  svg.addEventListener("pointerleave", hide);
  svg.addEventListener("focus", () => showAt(n - 1));
  svg.addEventListener("blur", hide);
  svg.addEventListener("keydown", e => {
    if (e.key === "ArrowLeft") { showAt(idx - 1); e.preventDefault(); }
    if (e.key === "ArrowRight") { showAt(idx + 1); e.preventDefault(); }
  });
  card.appendChild(svg); card.appendChild(tip);

  // 표 보기 (접근성)
  const det = document.createElement("details");
  const sum = document.createElement("summary"); sum.textContent = "표로 보기"; det.appendChild(sum);
  const wrap = document.createElement("div"); wrap.className = "tbl";
  const tb = document.createElement("table");
  const hr = document.createElement("tr");
  for (const h of ["날짜", "종가", "목표(상단)", "손절(하단)"]) {
    const th = document.createElement("th"); th.textContent = h; hr.appendChild(th);
  }
  tb.appendChild(hr);
  for (let i = n - 1; i >= 0; i--) {
    const tr = document.createElement("tr");
    for (const v of [p.dates[i], fmt(p.close[i]), fmt(p.upper[i]), fmt(p.lower[i])]) {
      const td = document.createElement("td"); td.textContent = v; tr.appendChild(td);
    }
    tb.appendChild(tr);
  }
  wrap.appendChild(tb); det.appendChild(wrap); card.appendChild(det);
  grid.appendChild(card);
}
const sub = document.querySelector(".sub");
sub.textContent = sub.textContent.replace("페이지 하단 데이터 기준 표기",
  `볼린저 ${DATA.boll}, 만료 ${DATA.expiry_days}달력일`);
</script>
