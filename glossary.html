.tools { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; margin: 0 0 14px; }

  font: inherit; font-size: 13px; padding: 7px 12px; width: min(320px, 100%);

.term .why { font-size: 12.5px; color: var(--ink-2); margin: 0; }

const list = document.getElementById("list");
const chipBox = document.getElementById("chips");
const cats = [...new Set(TERMS.map(t => t.c))];
let active = null;

const cards = [];
for (const cat of cats) {
  const h = document.createElement("div"); h.className = "cat";
  const items = TERMS.filter(t => t.c === cat);
  h.innerHTML = `${cat}<span class="n">${items.length}개</span>`;
  h.dataset.cat = cat;
  list.appendChild(h);
  for (const t of items) {
    const el = document.createElement("div"); el.className = "term";
    el.innerHTML = `<h3>${t.t}${t.en ? `<span class="en">${t.en}</span>` : ""}</h3>` +
      `<p>${t.d}</p>` + (t.w ? `<p class="why">${t.w}</p>` : "") +
      (t.f ? `<span class="fact">${t.f}</span>` : "");
    el.dataset.text = (t.t + " " + t.en + " " + t.d + " " + (t.w || "") + " " + (t.f || ""))
      .replace(/<[^>]+>/g, "").toLowerCase();
    el.dataset.cat = cat;
    list.appendChild(el); cards.push(el);
  }
}
for (const cat of cats) {
  const c = document.createElement("span"); c.className = "chip"; c.textContent = cat;
  c.onclick = () => { active = (active === cat) ? null : cat; render(); };
  c.dataset.cat = cat; chipBox.appendChild(c);
}

function render() {
  const q = document.getElementById("q").value.trim().toLowerCase();
  let shown = 0;
  for (const el of cards) {
    const ok = (!q || el.dataset.text.includes(q)) && (!active || el.dataset.cat === active);
    el.classList.toggle("hide", !ok); if (ok) shown++;
  }
  for (const h of list.querySelectorAll(".cat")) {
    const any = cards.some(el => el.dataset.cat === h.dataset.cat && !el.classList.contains("hide"));
    h.classList.toggle("hide", !any);
  }
  for (const c of chipBox.children) c.classList.toggle("on", c.dataset.cat === active);
  document.getElementById("nores").style.display = shown ? "none" : "block";
}
document.getElementById("q").addEventListener("input", render);
document.getElementById("foot").textContent =
  `총 ${TERMS.length}개 용어 · 실측 수치는 reports/ 원문 기준이며 재검증 시 갱신된다 · ` +
  `정의보다 "왜 중요한가"와 "우리 데이터에서 실제로 어땠나"에 무게를 뒀다.`;
</script>
