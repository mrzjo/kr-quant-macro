const W = 330, H = 150, M = {t:8, r:10, b:20, l:44};
const fmt = (v, dec) => v == null ? "-" : v.toLocaleString("ko-KR",
  {minimumFractionDigits: dec, maximumFractionDigits: dec});
const parseD = s => new Date(s + "T00:00:00");
const css = v => getComputedStyle(document.querySelector(".viz-root")).getPropertyValue(v);

function slice(key, days) {
  const s = DATA[key], cut = new Date(lastDate() - days * 864e5);
  const out = {dates: [], values: []};
  s.dates.forEach((d, i) => { if (parseD(d) >= cut) { out.dates.push(d); out.values.push(s.values[i]); } });
  return out;
}
function lastDate() {
  let m = 0;
  for (const k in DATA) { const d = parseD(DATA[k].dates.at(-1)); if (d > m) m = d; }
  return m;
}
function niceTicks(lo, hi, n = 4) {
  const span = hi - lo || Math.abs(hi) || 1;
  const step0 = span / n, mag = 10 ** Math.floor(Math.log10(step0));
  const step = [1, 2, 2.5, 5, 10].map(x => x * mag).find(x => x >= step0);
  const t0 = Math.ceil(lo / step) * step, ticks = [];
  for (let t = t0; t <= hi + 1e-9; t += step) ticks.push(+t.toFixed(10));
  return ticks;
}
function xLabels(dates) {
  const n = dates.length, want = Math.min(4, n), out = [];
  for (let i = 0; i < want; i++) out.push(Math.round(i * (n - 1) / Math.max(want - 1, 1)));
  return [...new Set(out)];
}
function xLabelText(d, days) {
  const dt = parseD(d);
  if (days > 500) return `${dt.getFullYear()}.${String(dt.getMonth()+1).padStart(2,"0")}`;
  return `${String(dt.getMonth()+1)}/${dt.getDate()}`;
}

function render(days) {
  const grid = document.getElementById("grid");
  grid.textContent = "";
  for (const c of CARDS) {
    const seriesDef = c.multi || [[c.key, c.title, "--s1"]];
    const series = seriesDef.map(([k, label, cvar]) => ({label, cvar, ...slice(k, days)}))
      .filter(s => s.values.length);
    if (!series.length) continue;
    const card = document.createElement("div"); card.className = "card";
    const h2 = document.createElement("h2"); h2.textContent = c.title; card.appendChild(h2);
    const meta = document.createElement("div"); meta.className = "meta";
    const lastD = series[0].dates.at(-1);
    meta.textContent = `${c.note} · 최신 ${lastD}`; card.appendChild(meta);

    // 헤드라인: 첫 시리즈 최근값 + 창 시작 대비
    const v0 = series[0].values[0], v1 = series[0].values.at(-1);
    const val = document.createElement("div"); val.className = "val";
    val.textContent = fmt(v1, c.dec) + (c.unit ? c.unit : "");
    const dRel = c.unit === "%" || c.unit === "%p"
      ? `${v1 - v0 >= 0 ? "+" : ""}${fmt(v1 - v0, 2)}%p`
      : `${v1 - v0 >= 0 ? "+" : ""}${fmt((v1 / v0 - 1) * 100, 1)}%`;
    const small = document.createElement("small");
    small.textContent = `창 시작 대비 ${dRel}`; val.appendChild(small);
    card.appendChild(val);

    // y 도메인 (전 시리즈 합산)
    const all = series.flatMap(s => s.values).filter(v => v != null);
    let lo = Math.min(...all), hi = Math.max(...all);
    const pad = (hi - lo || Math.abs(hi) || 1) * 0.08; lo -= pad; hi += pad;
    const X = i => M.l + (W - M.l - M.r) * (series[0].dates.length === 1 ? 0.5
      : i / (series[0].dates.length - 1));
    const Y = v => M.t + (H - M.t - M.b) * (1 - (v - lo) / (hi - lo));

    const NS = "http://www.w3.org/2000/svg";
    const svg = document.createElementNS(NS, "svg");
    svg.setAttribute("viewBox", `0 0 ${W} ${H}`);
    svg.setAttribute("tabindex", "0");
    svg.setAttribute("role", "img");
    svg.setAttribute("aria-label", c.title);
    // 그리드·y눈금
    for (const t of niceTicks(lo, hi)) {
      const ln = document.createElementNS(NS, "line");
      ln.setAttribute("x1", M.l); ln.setAttribute("x2", W - M.r);
      ln.setAttribute("y1", Y(t)); ln.setAttribute("y2", Y(t));
      ln.setAttribute("stroke", "var(--grid)"); ln.setAttribute("stroke-width", "1");
      svg.appendChild(ln);
      const tx = document.createElementNS(NS, "text");
      tx.setAttribute("x", M.l - 5); tx.setAttribute("y", Y(t) + 3.5);
      tx.setAttribute("text-anchor", "end"); tx.setAttribute("class", "tick");
      tx.textContent = fmt(t, t % 1 ? Math.min(c.dec, 2) : 0); svg.appendChild(tx);
    }
    // x 라벨 (첫 시리즈 캘린더 기준)
    for (const i of xLabels(series[0].dates)) {
      const tx = document.createElementNS(NS, "text");
      tx.setAttribute("x", X(i)); tx.setAttribute("y", H - 6);
      tx.setAttribute("text-anchor", i === 0 ? "start" : "middle");
      tx.setAttribute("class", "tick");
      tx.textContent = xLabelText(series[0].dates[i], days); svg.appendChild(tx);
    }
    // 시리즈 (일간 시리즈는 각자 캘린더 — 각 시리즈 좌표는 자기 인덱스 기준)
    for (const s of series) {
      const Xs = i => M.l + (W - M.l - M.r) * (s.dates.length === 1 ? 0.5 : i / (s.dates.length - 1));
      const pts = s.values.map((v, i) => v == null ? null : `${Xs(i).toFixed(1)},${Y(v).toFixed(1)}`)
        .filter(Boolean);
      const pl = document.createElementNS(NS, "polyline");
      pl.setAttribute("points", pts.join(" "));
      pl.setAttribute("fill", "none"); pl.setAttribute("stroke", `var(${s.cvar})`);
      pl.setAttribute("stroke-width", "2"); pl.setAttribute("stroke-linejoin", "round");
      svg.appendChild(pl);
      if (s.values.length <= 14) {  // 월간·희소 시리즈는 마커 병기
        s.values.forEach((v, i) => {
          if (v == null) return;
          const ci = document.createElementNS(NS, "circle");
          ci.setAttribute("cx", Xs(i)); ci.setAttribute("cy", Y(v)); ci.setAttribute("r", "4");
          ci.setAttribute("fill", `var(${s.cvar})`);
          ci.setAttribute("stroke", "var(--surface-1)"); ci.setAttribute("stroke-width", "2");
          svg.appendChild(ci);
        });
      }
    }
    // 다계열 직접 라벨(끝점) — relief 규칙(마젠타 대비 경고 대응)
    if (series.length > 1) {
      const used = [];
      for (const s of series) {
        let y = Y(s.values.at(-1));
        while (used.some(u => Math.abs(u - y) < 10)) y += 10;
        used.push(y);
        const tx = document.createElementNS(NS, "text");
        tx.setAttribute("x", W - M.r); tx.setAttribute("y", Math.min(y + 3, H - M.b - 2));
        tx.setAttribute("text-anchor", "end"); tx.setAttribute("class", "tick");
        tx.setAttribute("fill", "var(--ink-2)");
        tx.setAttribute("style", "paint-order:stroke;stroke:var(--surface-1);stroke-width:3px");
        tx.textContent = `${s.label} ${fmt(s.values.at(-1), c.dec)}`;
        svg.appendChild(tx);
      }
    }
    // 크로스헤어 + 툴팁
    const cross = document.createElementNS(NS, "line");
    cross.setAttribute("y1", M.t); cross.setAttribute("y2", H - M.b);
    cross.setAttribute("stroke", "var(--axis)"); cross.setAttribute("stroke-width", "1");
    cross.style.display = "none"; svg.appendChild(cross);
    const tip = document.createElement("div"); tip.className = "tip";
    let idx = -1;
    const showAt = (i) => {
      idx = i;
      const n = series[0].dates.length;
      i = Math.max(0, Math.min(n - 1, i));
      cross.style.display = ""; cross.setAttribute("x1", X(i)); cross.setAttribute("x2", X(i));
      tip.style.display = "block"; tip.textContent = "";
      const d = document.createElement("div"); d.className = "d";
      d.textContent = series[0].dates[i]; tip.appendChild(d);
      for (const s of series) {
        // 시리즈별 캘린더 다름 → 날짜 매칭(같거나 직전)
        const target = series[0].dates[i];
        let j = s.dates.length - 1;
        while (j > 0 && s.dates[j] > target) j--;
        const row = document.createElement("div"); row.className = "row";
        const k = document.createElement("span"); k.className = "k";
        k.style.borderTopColor = `var(${s.cvar})`; row.appendChild(k);
        const b = document.createElement("b");
        b.textContent = fmt(s.values[j], c.dec) + (c.unit || ""); row.appendChild(b);
        if (series.length > 1) {
          const nm = document.createElement("span"); nm.className = "n";
          nm.textContent = s.label; row.appendChild(nm);
        }
        tip.appendChild(row);
      }
      const rect = svg.getBoundingClientRect();
      const px = X(i) / W * rect.width;
      tip.style.left = Math.min(px + 12, rect.width - 130) + "px";
      tip.style.top = "44px";
    };
    const hide = () => { cross.style.display = "none"; tip.style.display = "none"; idx = -1; };
    svg.addEventListener("pointermove", e => {
      const rect = svg.getBoundingClientRect();
      const fx = (e.clientX - rect.left) / rect.width * W;
      const n = series[0].dates.length;
      showAt(Math.round((fx - M.l) / (W - M.l - M.r) * (n - 1)));
    });
    svg.addEventListener("pointerleave", hide);
    svg.addEventListener("focus", () => showAt(series[0].dates.length - 1));
    svg.addEventListener("blur", hide);
    svg.addEventListener("keydown", e => {
      if (e.key === "ArrowLeft") { showAt(Math.max(0, idx - 1)); e.preventDefault(); }
      if (e.key === "ArrowRight") { showAt(Math.min(series[0].dates.length - 1, idx + 1)); e.preventDefault(); }
    });
    card.appendChild(svg); card.appendChild(tip);
    // 범례 (≥2 시리즈)
    if (series.length > 1) {
      const lg = document.createElement("div"); lg.className = "legend";
      for (const s of series) {
        const it = document.createElement("span");
        const k = document.createElement("span"); k.className = "key";
        k.style.borderTopColor = `var(${s.cvar})`; it.appendChild(k);
        it.appendChild(document.createTextNode(s.label)); lg.appendChild(it);
      }
      card.appendChild(lg);
    }
    // 표 보기 (접근성 — 툴팁 없이도 값 도달)
    const det = document.createElement("details");
    const sum = document.createElement("summary"); sum.textContent = "표로 보기"; det.appendChild(sum);
    const wrap = document.createElement("div"); wrap.className = "tbl";
    const tb = document.createElement("table");
    const hr = document.createElement("tr");
    for (const h of ["날짜", ...series.map(s => s.label)]) {
      const th = document.createElement("th"); th.textContent = h; hr.appendChild(th);
    }
    tb.appendChild(hr);
    for (let i = series[0].dates.length - 1; i >= 0; i--) {
      const tr = document.createElement("tr");
      const td0 = document.createElement("td"); td0.textContent = series[0].dates[i]; tr.appendChild(td0);
      for (const s of series) {
        const target = series[0].dates[i];
        let j = s.dates.length - 1; while (j > 0 && s.dates[j] > target) j--;
        const td = document.createElement("td"); td.textContent = fmt(s.values[j], c.dec); tr.appendChild(td);
      }
      tb.appendChild(tr);
    }
    wrap.appendChild(tb); det.appendChild(wrap); card.appendChild(det);
    grid.appendChild(card);
  }
}
document.querySelectorAll(".filters button").forEach(b => b.addEventListener("click", () => {
  document.querySelectorAll(".filters button").forEach(x => x.setAttribute("aria-pressed", "false"));
  b.setAttribute("aria-pressed", "true");
  render(+b.dataset.days);
}));
render(365);
</script>
